<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adhiparasakthi Engineering College Login</title>

<style>
    body {
        margin: 0;
        font-family: Arial;
        background: linear-gradient(to right, #141e30, #243b55);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .box {
        background: white;
        padding: 30px;
        border-radius: 10px;
        width: 350px;
        text-align: center;
    }

    img {
        width: 120px;
    }

    input {
        width: 90%;
        padding: 10px;
        margin: 10px 0;
    }

    button {
        width: 95%;
        padding: 10px;
        background: #141e30;
        color: white;
        border: none;
        cursor: pointer;
    }
</style>

</head>

<body>

<div class="box">

    <img src="logo.png" alt="College Logo">

    <h3>ADHIPARASAKTHI ENGINEERING COLLEGE</h3>

    <input type="text" placeholder="Username">
    <input type="password" placeholder="Password">

    <button onclick="alert('Login Successful')">
        Login
    </button>

</div>

</body>
</html>
